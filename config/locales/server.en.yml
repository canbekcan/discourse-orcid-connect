en:
  site_settings:
    orcid_connect_enabled: Enable ORCid Connect authentication. Customize user interface text <a href='%{base_path}/admin/customize/site_texts?q=js.login.orcid'>here</a>
    orcid_connect_discovery_document: "ORCid Connect discovery document URL. Normally located at 'https://your.domain/.well-known/openid-configuration'"
    orcid_connect_client_id: "ORCid Connect client ID"
    orcid_connect_client_secret: "ORCid Connect client secret"
    orcid_connect_authorize_scope: "The scopes sent to the authorize endpoint. This must include 'openid'."
    orcid_connect_rp_initiated_logout: "Redirect the user to end_session_endpoint after logout. Must be supported by your identity provider and included in the discovery document."
    orcid_connect_rp_initiated_logout_redirect: "(optional) The post_logout_redirect_uri which will be passed to the logout endpoint. If provided, it must be registered with the identity provider."
    orcid_connect_rp_initiated_logout_include_client_id: "(optional) Append the client_id (orcid_connect_client_id setting) as a query parameter to the logout endpoint"
    orcid_connect_token_scope: "The scopes sent when requesting the token endpoint. The official specification does not require this."
    orcid_connect_error_redirects: "If the callback error_reason contains the first parameter, the user will be redirected to the URL in the second parameter"
    orcid_connect_allow_association_change: "Allow users to disconnect and reconnect their Discourse accounts from the ORCid Connect provider"
    orcid_connect_verbose_logging: "Log detailed orcid-connect authentication information to `/logs`. Keep this disabled during normal use."
    orcid_connect_authorize_parameters: "URL parameters which will be included in the redirect from /auth/orcid to the IDP's authorize endpoint"
    orcid_connect_overrides_email: "On every login, override the user's email using the orcid-connect value. Works the same as the {{setting:auth_overrides_email}} setting, but is specific to ORCid Connect logins."
    orcid_connect_claims: "Explicitly define the claims for use with providers that don't pass data back based on scopes. (JSON)"
    orcid_connect_groups_claim: "The name of the claim in the ORCID token that contains the user's groups as an array of strings. Leave blank to disable group syncing."
    orcid_connect_user_field_mappings: "Map ORCID claims onto Discourse user fields. Each entry pairs an ORCID claim name with the numeric ID of a Discourse user field."
    orcid_connect_match_by_email: "Use email address to match ORCid Connect authentications to existing Discourse user accounts."
    orcid_connect_use_pkce: "Enable Proof Key for Code Exchange (PKCE) for ORCid Connect authentication."
  login:
    omniauth_error:
      orcid_connect_discovery_error: Unable to fetch configuration from identity provider. Please try again.
