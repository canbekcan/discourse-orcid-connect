uk:
  site_settings:
    orcid_connect_enabled: Увімкнути автентифікацію ORCid Connect. Налаштувати текст інтерфейсу користувача <a href='%{base_path}/admin/customize/site_texts?q=js.login.orcid'>тут</a>
    orcid_connect_discovery_document: "URL-адреса документа для виявлення ORCid Connect. Зазвичай розташована за адресою «https://your.domain/.well-known/openid-configuration»."
    orcid_connect_client_id: "Ідентифікатор клієнта ORCid Connect"
    orcid_connect_client_secret: "Секрет клієнта ORCid Connect"
    orcid_connect_authorize_scope: "Області видимості, надіслані до кінцевої точки авторизації. Вони повинні містити «openid»."
    orcid_connect_rp_initiated_logout: "Перенаправляти користувача до end_session_endpoint після виходу з системи. Має підтримуватися вашим постачальником ідентифікаційних даних та бути включеним до документа виявлення."
    orcid_connect_rp_initiated_logout_redirect: "(необов’язково) post_logout_redirect_uri, який буде передано кінцевій точці виходу з системи. Якщо його надано, його потрібно зареєструвати у постачальника ідентифікаційних даних."
    orcid_connect_rp_initiated_logout_include_client_id: "(необов’язково) Додайте client_id (параметр orcid_connect_client_id) як параметр запиту до кінцевої точки виходу з системи"
    orcid_connect_token_scope: "Області видимості, що надсилаються під час запиту кінцевої точки токена. Офіційна специфікація цього не вимагає."
    orcid_connect_error_redirects: "Якщо error_reason містить перший параметр, користувач буде перенаправлений на URL-адресу в другому параметрі"
    orcid_connect_allow_association_change: "Дозволити користувачам відключати та повторно підключати свої облікові записи Discourse від постачальника ORCid Connect"
    orcid_connect_verbose_logging: "Записувати детальну інформацію про автентифікацію orcid-connect до `/logs`. Під час звичайного використання тримайте цю функцію вимкненою."
    orcid_connect_authorize_parameters: "Параметри URL, які будуть включені в перенаправлення з /auth/orcid на кінцеву точку авторизації IDP"
    orcid_connect_overrides_email: "Під час кожного входу замінювати електронну адресу користувача значенням orcid-connect. Працює так само, як і налаштування {{setting:auth_overrides_email}} , але стосується лише входу в систему через ORCid Connect."
    orcid_connect_claims: "Явно визначте вимоги для використання з провайдерами, які не передають дані назад на основі діапазонів. (JSON)"
    orcid_connect_groups_claim: "Назва вимоги в токені ORCID, що містить групи користувача у вигляді масиву рядків. Залиште пустим, щоб вимкнути синхронізацію груп."
    orcid_connect_user_field_mappings: "Зіставте вимоги ORCID з полями користувачів Discourse. Кожен запис поєднує назву заяви ORCID з числовим полем ID користувача Discourse."
    orcid_connect_match_by_email: "Використовувати адресу електронної пошти для зіставлення автентифікацій ORCid Connect з існуючими обліковими записами користувачів Discourse."
    orcid_connect_use_pkce: "Увімкнути ключ підтвердження для обміну кодом (PKCE) для автентифікації ORCid Connect."
  login:
    omniauth_error:
      orcid_connect_discovery_error: Не вдалося отримати конфігурацію від постачальника ідентифікаційних даних. Спробуйте ще раз.
