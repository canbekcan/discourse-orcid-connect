hu:
  site_settings:
    orcid_connect_enabled: Engedélyezze az ORCid Connect hitelesítést. A felhasználói felület szövegeit <a href='%{base_path}/admin/customize/site_texts?q=js.login.oidc'>itt</a> szabhatja testre.
    orcid_connect_discovery_document: "ORCid Connect felfedezési dokumentum URL-je. Általában a 'https://your.domain/.well-known/openid-configuration' útvonalon található."
    orcid_connect_client_id: "ORCid Connect ügyfélazonosító"
    orcid_connect_client_secret: "ORCid Connect kliens titkos kódja"
    orcid_connect_authorize_scope: "Az autorizációs (hitelesítési) végpontnak elküldött hatókörök (scopes). Ennek tartalmaznia kell az 'openid' értéket."
    orcid_connect_rp_initiated_logout: "Kijelentkezés után a felhasználó átirányítása az end_session_endpoint végpontra. Ezt a funkciót az identitásszolgáltatónak támogatnia kell, és szerepelnie kell a felfedezési (discovery) dokumentumban."
    orcid_connect_rp_initiated_logout_redirect: "(opcionális) A kijelentkezési végpontnak átadott post_logout_redirect_uri. Ha megadásra kerül, regisztrálva kell lennie az identitásszolgáltatónál."
    orcid_connect_rp_initiated_logout_include_client_id: "(opcionális) A client_id (orcid_connect_client_id beállítás) hozzáfűzése lekérdezési paraméterként (query parameter) a kijelentkezési végponthoz."
    orcid_connect_token_scope: "A token végpont lekérésekor elküldött hatókörök (scopes). A hivatalos specifikáció ezt nem teszi kötelezővé."
    orcid_connect_error_redirects: "Ha a visszahívási (callback) hiba oka tartalmazza az első paramétert, a felhasználó a második paraméterben megadott URL-re lesz átirányítva."
    orcid_connect_allow_association_change: "Lehetővé teszi a felhasználók számára, hogy leválasszák, majd újra összekapcsolják Discourse-fiókjukat az ORCid Connect szolgáltatóval."
    orcid_connect_verbose_logging: "Részletes ORCid Connect hitelesítési adatok naplózása a /logs mappába. Normál használat mellett hagyja kikapcsolva."
    orcid_connect_authorize_parameters: "Azok az URL-paraméterek, amelyek bekerülnek az /auth/oidc útvonalról az IdP autorizációs végpontjára történő átirányításba."
    orcid_connect_claims: "Explicit módon határozza meg az igényeket azon szolgáltatókhoz, amelyek nem küldenek vissza adatokat a hatókörök alapján. (JSON)"
    orcid_connect_match_by_email: "E-mail-cím használata az ORCid Connect hitelesítések és a meglévő Discourse felhasználói fiókok összekapcsolásához."
    orcid_connect_use_pkce: "A PKCE (Proof Key for Code Exchange) engedélyezése az ORCid Connect hitelesítéshez."
  login:
    omniauth_error:
      orcid_connect_discovery_error: Nem sikerült lekérni a konfigurációt az identitásszolgáltatótól. Kérjük, próbálja újra.
