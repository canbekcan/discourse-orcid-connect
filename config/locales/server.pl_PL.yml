    orcid_connect_rp_initiated_logout_redirect: "(opcjonalnie) Parametr post_logout_redirect_uri, który zostanie przekazany do punktu końcowego wylogowania. Jeśli zostanie podany, musi zostać zarejestrowany u dostawcy tożsamości."
    orcid_connect_rp_initiated_logout_include_client_id: "(opcjonalnie) Dołącz client_id (ustawienie orcid_connect_client_id) jako parametr zapytania do punktu końcowego wylogowania"
