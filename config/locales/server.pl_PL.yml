    orcid_connect_overrides_email: "Przy każdym logowaniu zastąp adres e-mail użytkownika wartością orcid-connect. Działa tak samo jak ustawienie {{setting:auth_overrides_email}} , ale jest specyficzne dla logowań ORCid Connect."
    orcid_connect_claims: "Jasno zdefiniuj zgłoszenia do wykorzystania z dostawcami, którzy nie przekazują danych z powrotem na podstawie zakresów. (JSON)"
