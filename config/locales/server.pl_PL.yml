    orcid_connect_user_field_mappings: "Mapuj roszczenia ORCID na pola użytkownika Discourse. Każdy wpis łączy nazwę roszczenia ORCID z numerycznym identyfikatorem pola użytkownika Discourse."
    orcid_connect_match_by_email: "Użyj adresu e-mail, aby dopasować uwierzytelnienia ORCid Connect do istniejących kont użytkowników Discourse."
