pl_PL:
  site_settings:
    orcid_connect_enabled: Włącz uwierzytelnianie ORCid Connect. Dostosuj tekst interfejsu użytkownika <a href='%{base_path}/admin/customize/site_texts?q=js.login.orcid'>tutaj</a>
