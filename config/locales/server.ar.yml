    orcid_connect_groups_claim: "اسم الحقل (claim) في رمز ORCID الذي يحتوي على مجموعات المستخدمين كمصفوفة من السلاسل النصية. اتركه فارغًا لتعطيل مزامنة المجموعات."
    orcid_connect_match_by_email: "استخدم عنوان البريد الإلكتروني لمطابقة مصادقات OpenID Connect مع حسابات مستخدمي Discourse الموجودة."
    orcid_connect_use_pkce: "تفعيل Proof Key for Code Exchange (PKCE) لمصادقة OpenID Connect."
