    orcid_connect_rp_initiated_logout_redirect: "(اختياري) post_logout_redirect_uri الذي سيتم تمريره إلى نقطة نهاية تسجيل الخروج. في حال إدخاله، فإنه يجب تسجيله باستخدام موفِّر الهوية."
    orcid_connect_rp_initiated_logout_include_client_id: "(اختياري) أضف client_id (الإعداد orcid_connect_client_id) كمعامل استعلام إلى نقطة نهاية تسجيل الخروج"
    orcid_connect_token_scope: "النطاقات المرسلة عند طلب نقطة نهاية الرمز المميَّز. لا تتطلب المواصفات الرسمية ذلك."
    orcid_connect_error_redirects: "إذا كان رد الاتصال error_reason يحتوي على المعلمة الأولى، فستتم إعادة توجيه المستخدم إلى عنوان URL في المعلمة الثانية"
    orcid_connect_allow_association_change: "السماح للمستخدمين بإلغاء ربط حسابات Discourse وإعادة ربطها من مقدِّم خدمة OpenID Connect"
    orcid_connect_verbose_logging: "تسجيل معلومات مصادقة orcid-connect المفصَّلة في `/logs`. اترك هذا الإعداد متوقفًا خلال الاستخدام العادي."
    orcid_connect_authorize_parameters: "معلمات عنوان URL التي تضمينها في إعادة التوجيه من /auth/oidc إلى نقطة نهاية مصادقة IDP"
